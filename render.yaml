services:
  # 1. Web Service (API + Worker)
  - type: web
    name: clientmanager-api
    env: docker
    dockerContext: .
    dockerfilePath: src/ClientManager.Api/Dockerfile
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__RabbitMQ
        sync: false # CloudAMQP URL
      # Email: Resend
      - key: Resend__ApiKey
        sync: false # Resend API key (re_xxx) - already configured
      - key: Resend__FromEmail
        value: onboarding@resend.dev
      - key: Resend__FromName
        value: ClientManager
      # RavenDB
      - key: RavenDbSettings__Url
        sync: false
      - key: RavenDbSettings__Database
        value: ClientManagerDB
      - key: RavenDbSettings__CertificateBase64
        sync: false

  # Worker removido - agora roda in-process na API como MessageBusWorker