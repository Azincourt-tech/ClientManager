services:
  # 1. Web Service (API + Worker)
  - type: web
    name: clientmanager-api
    env: docker
    dockerContext: .
    dockerfilePath: src/ClientManager.Api/Dockerfile
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # Email: Resend
      - key: Resend__ApiKey
        sync: false
      - key: Resend__FromEmail
        sync: false
      - key: Resend__FromName
        sync: false

  # RavenDB
      - key: RavenDbSettings__Url
        sync: false
      - key: RavenDbSettings__Database
        sync: false
      - key: RavenDbSettings__CertificateBase64
        sync: false
      - key: RavenDbSettings__CertificatePassword
        sync: false
