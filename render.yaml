services:
  # 1. Web Service (API)
  - type: web
    name: clientmanager-api
    env: docker
    dockerContext: .
    dockerfilePath: src/ClientManager.Api/Dockerfile
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__RabbitMQ
        sync: false # CloudAMQP URL
      # Email: Resend (producao)
      - key: Smtp__Host
        value: smtp.resend.com
      - key: Smtp__Port
        value: 465
      - key: Smtp__Username
        value: resend
      - key: Smtp__Password
        sync: false # Resend API key (re_xxx)
      - key: Smtp__FromEmail
        sync: false # Verified sender email in Resend
      - key: Smtp__FromName
        value: ClientManager
      # RavenDB
      - key: RavenDbSettings__Url
        sync: false
      - key: RavenDbSettings__Database
        value: ClientManagementDB
      - key: RavenDbSettings__CertificateBase64
        sync: false

  # 2. Background Worker
  - type: worker
    name: clientmanager-worker
    env: docker
    dockerContext: .
    dockerfilePath: src/ClientManager.Worker/Dockerfile
    plan: free
    envVars:
      - key: DOTNET_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__RabbitMQ
        sync: false # Same CloudAMQP URL as API
      # Email: Resend (producao)
      - key: Smtp__Host
        value: smtp.resend.com
      - key: Smtp__Port
        value: 465
      - key: Smtp__Username
        value: resend
      - key: Smtp__Password
        sync: false # Resend API key (re_xxx)
      - key: Smtp__FromEmail
        sync: false # Verified sender email in Resend
      - key: Smtp__FromName
        value: ClientManager
      # RavenDB
      - key: RavenDbSettings__Url
        sync: false
      - key: RavenDbSettings__Database
        value: ClientManagementDB
      - key: RavenDbSettings__CertificateBase64
        sync: false
